<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <base href="/EFT_hideout_task_checker/">
    <title>タスク一覧</title>
    <style>
        body {font-family: sans-serif;}
        .task {
            padding: 8px;
            border-bottom: 1px solid #ccc;
        }
    </style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<p>
    <a href="index.html" style="
        display: inline-block;
        padding: 10px 20px;
        background: #4CAF50;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    ">トップページへ</a>
</p>

<h1>タスク一覧</h1>
<button id="show-active">未完了タスクを表示</button>
<button id="show-completed">完了済みタスクを表示</button>


<button id="undo-btn">1つ前に戻す</button>
<button id="reset-btn">進行度をリセット</button>

<h2>フィルタ</h2>

<div id="filters" style="margin-bottom:20px;">

    <div>
        <label><input type="checkbox" class="filter-kappa"> Kappa 必須</label>
    </div>

    <div>
        <strong>トレーダー</strong><br>
        <label><input type="checkbox" class="filter-trader" value="Prapor"> Prapor</label>
        <label><input type="checkbox" class="filter-trader" value="Therapist"> Therapist</label>
        <label><input type="checkbox" class="filter-trader" value="Skier"> Skier</label>
        <label><input type="checkbox" class="filter-trader" value="Peacekeeper"> Peacekeeper</label>
        <label><input type="checkbox" class="filter-trader" value="Mechanic"> Mechanic</label>
        <label><input type="checkbox" class="filter-trader" value="Jaeger"> Jaeger</label>
        <label><input type="checkbox" class="filter-trader" value="Ragman"> Ragman</label>
        <label><input type="checkbox" class="filter-trader" value="Fence"> Fence</label>
        <label><input type="checkbox" class="filter-trader" value="Ref"> Ref</label>
        <label><input type="checkbox" class="filter-trader" value="Lightkeeper"> Lightkeeper</label>
        <label><input type="checkbox" class="filter-trader" value="BTR Driver"> BTR Driver</label>
    </div>

    <div>
        <strong>タイプ</strong><br>
        <label><input type="checkbox" class="filter-type" value="place"> 設置</label>
        <label><input type="checkbox" class="filter-type" value="kill"> キル</label>
        <label><input type="checkbox" class="filter-type" value="item"> アイテム納品</label>
        <label><input type="checkbox" class="filter-type" value="task_item"> タスクアイテム</label>
        <label><input type="checkbox" class="filter-type" value="location"> 場所訪問</label>
        <label><input type="checkbox" class="filter-type" value="progression"> レベル</label>
        <label><input type="checkbox" class="filter-type" value="Transit"> トランジット</label>
        <label><input type="checkbox" class="filter-type" value="sell"> 売却</label>
        <label><input type="checkbox" class="filter-type" value="exit"> 脱出</label>
        <label><input type="checkbox" class="filter-type" value="Arena"> アリーナ</label>
    </div>

</div>


<h2>タスク進行度</h2>

<div style="display:flex; gap:40px;">
    <div>
        <h3>Kappa 必須タスク</h3>
        <canvas id="kappaChart" width="200" height="200"></canvas>
    </div>

    <div>
        <h3>全タスク</h3>
        <canvas id="allTaskChart" width="200" height="200"></canvas>
    </div>
</div>

<input type="text" id="task-search" placeholder="タスク名で検索..." 
       style="width: 250px; padding: 6px; margin-bottom: 10px;">

<div id="task-list"></div>

<script>
let tasks = {};
let nameToId = {};
let historyStack = [];

// --- 同内容タスク ---
const sharedTasks = {
    share1: [
        "prapor_Big Customer",
        "therapist_Out of Curiosity",
        "skier_Chemical - Part 4"
    ],
    share2: [
        "therapist_Colleagues - Part 3",
        "jaeger_The Huntsman Path - Sadist"
    ],
    share3: [
        "Therapist_Supply Plans",
        "skier_Kind of Sabotage"
    ],
    share4: [
        "skier_Choose Your Friends Wisely",
        "btr driver_The Price of Independence"
    ],
    share5: [
        "lightkeeper_Order From Outside",
        "btr driver_Battery Change"
    ],
    share6: [
        "lightkeeper_Simple Side Job",
        "btr driver_Protect the Sky"
    ]
};

fetch("task.json")
    .then(res => res.json())
    .then(data => {

        let orderCounter = 0;

        Object.entries(data).forEach(([traderName, taskList]) => {
            taskList.forEach(task => {

                if (!task || typeof task !== "object") return;
                
                const id = task.task_id;
                const name = task.task.name;

                tasks[id] = {
                    name: name,
                    requires: task.requires,
                    kappa: task.kappa,
                    trader: traderName,
                    maps: task.maps,
                    types: task.task.types,
                    link: task.link || `https://wikiwiki.jp/eft/${traderName}/${encodeURIComponent(name)}`,
                    order: orderCounter++
                };

                nameToId[name] = id;
            });
        });
        // --- maps / types の正規化 ---
        Object.entries(tasks).forEach(([id, task]) => {
            task.requires = task.requires.map(req => {
                // req が task_id ならそのまま
                if (tasks[req]) return req;

                // 名前なら task_id に変換
                if (nameToId[req]) return nameToId[req];

                // どちらでもなければ無視
                return null;
            }).filter(Boolean);

            // maps: "Any" や空文字を除去
            task.maps = (task.maps || []).filter(m => m && m !== "Any");

            // types: 空文字を除去
            task.types = (task.types || []).filter(t => t);

        });

                // ★ sharedTasks を task_id に変換
        Object.keys(sharedTasks).forEach(group => {
            sharedTasks[group] = sharedTasks[group].map(name => {
                return nameToId[name] || name;
            });
        
        });

        render();
    });

// --- タイプの日本語マップをフィルタ UI から自動生成 ---
const typeNameMap = {};
document.querySelectorAll(".filter-type").forEach(cb => {
    const jp = cb.parentElement.textContent.trim(); // ラベルの日本語
    typeNameMap[cb.value] = jp;
});

// --- 完了状態の読み込み ---
let completed = JSON.parse(localStorage.getItem("completedTasks") || "{}");

let showCompleted = false;

// --- 直前の状態を保存する変数 ---

// --- 1つ前に戻す ---
document.getElementById("undo-btn").addEventListener("click", () => {
    if (historyStack.length === 0) return;

    completed = historyStack.pop();
    localStorage.setItem("completedTasks", JSON.stringify(completed));
    
    lastRenderedIds = new Set();
    render();
});

// --- リセット ---
document.getElementById("reset-btn").addEventListener("click", () => {
    completed = {};
    historyStack = [];
    localStorage.setItem("completedTasks", "{}");

    lastRenderedIds = new Set();

    // ★ DOM も一度全部消す
    const container = document.getElementById("task-list");
    container.innerHTML = "";

    render();
});

// 未完了タスク表示
document.getElementById("show-active").addEventListener("click", () => {
    showCompleted = false;
    render();
});

//完了済みタスク表示
document.getElementById("show-completed").addEventListener("click", () => {
    showCompleted = true;
    render();
});


// --- 前提タスクを再帰的に完了扱いにする ---
function completeTask(id, visited = new Set()) {
    // すでに処理済みならスキップ（無限ループ防止 & 高速化）
    if (visited.has(id)) return;
    visited.add(id);

    // すでに完了済みならスキップ
    if (completed[id]) return;
    completed[id] = true;

    const task = tasks[id];
    if (!task) return;

    // --- 前提タスク（requires）を再帰的に完了 ---
    task.requires.forEach(reqId => {
        completeTask(reqId, visited);
    });

    // --- 同内容タスク（sharedTasks）も完了扱い ---
    for (const group in sharedTasks) {
        if (sharedTasks[group].includes(id)) {
            sharedTasks[group].forEach(otherId => {
                completeTask(otherId, visited);
            });
        }
    }
}


function getFilters() {
    const kappa = document.querySelector(".filter-kappa")?.checked || false;

    const traders = [...document.querySelectorAll(".filter-trader:checked")]
        .map(cb => cb.value);

    const types = [...document.querySelectorAll(".filter-type:checked")]
        .map(cb => cb.value);

    return { kappa, traders, types };
}

document.querySelectorAll("#filters input").forEach(input => {
    input.addEventListener("change", () => {
        render();
    });
});

let lastRenderedIds = new Set();

// チェックボックスのイベント委譲（ここを必ず入れる）
document.getElementById("task-list").addEventListener("change", (e) => {
    if (e.target.type !== "checkbox") return;

   historyStack.push(JSON.parse(JSON.stringify(completed)));

    const id = e.target.dataset.id;

    if (e.target.checked) completeTask(id);
    else completed[id] = false;

    localStorage.setItem("completedTasks", JSON.stringify(completed));
    render();
});

// --- タスク一覧を描画 ---
function render() {
    const container = document.getElementById("task-list");
    const filters = getFilters();

    const prevRendered = new Set(lastRenderedIds);

    // --- 今回表示すべきタスクID ---
    const currentIds = [];

    Object.entries(tasks).forEach(([id, task]) => {

        if (!showCompleted && completed[id]) return;
        if (showCompleted && !completed[id]) return;

        if (filters.kappa && !task.kappa) return;

        if (filters.traders.length > 0 && !filters.traders.includes(task.trader)) return;

        if (filters.types.length > 0) {
            const hasAllTypes = filters.types.every(t => task.types.includes(t));
            if (!hasAllTypes) return;
        }

        // --- 検索フィルター ---
        const searchText = document.getElementById("task-search").value.toLowerCase();
        if (!task.name.toLowerCase().includes(searchText)) return;

        currentIds.push(id);
    });

    // --- 表示順を order でソート ---
    currentIds.sort((a, b) => tasks[a].order - tasks[b].order);

    const currentSet = new Set(currentIds);

    // --- 削除すべき DOM を消す ---
    prevRendered.forEach(id => {
        if (!currentSet.has(id)) {
            const el = document.getElementById(`task-${id}`);
            if (el) el.remove();
        }
    });

    // --- DOM を正しい順番に並べる（新規追加 or 既存移動） ---
    currentIds.forEach(id => {

        let div = document.getElementById(`task-${id}`);

        // --- DOM が存在しない場合は作成 ---
        if (!div) {
            const task = tasks[id];

            div = document.createElement("div");
            div.className = "task";
            div.id = `task-${id}`;

            div.innerHTML = `
                <label style="display:flex; justify-content:space-between; align-items:center;">
                    <span>
                        <input type="checkbox" data-id="${id}" ${completed[id] ? "checked" : ""}>
                        [${task.trader}] ${task.name}
                        <span style="margin-left:6px; font-size:12px; color:#666;">
                            ${task.types.map(t => `
                                <span style="
                                    display:inline-block;
                                    padding:2px 6px;
                                    margin-left:4px;
                                    background:#eee;
                                    border-radius:4px;
                                    font-size:11px;
                                ">
                                    ${typeNameMap[t] || t}
                            </span>`).join("")}
                        </span>
                    </span>
                    <a href="${task.link}" target="_blank" style="margin-left:10px;">詳細</a>
                </label>
            `;
        }

        // --- 正しい位置に挿入（既存でも移動する） ---
        const nextId = currentIds[currentIds.indexOf(id) + 1];
        const nextEl = document.getElementById(`task-${nextId}`);

        if (nextEl) {
            container.insertBefore(div, nextEl);
        } else {
            container.appendChild(div);
        }
    });

    //タスク名検索
    document.getElementById("task-search").addEventListener("input", render);


    lastRenderedIds = currentSet;

    updateCharts();
}






let kappaChart = null;
let allTaskChart = null;

function updateCharts() {
    const totalTasks = Object.keys(tasks).length;
    const completedTasks = Object.keys(completed).filter(id => completed[id]).length;

    const kappaTasks = Object.values(tasks).filter(t => t.kappa).length;
    const completedKappa = Object.entries(tasks)
        .filter(([id, t]) => t.kappa && completed[id])
        .length;

    // --- Kappa Chart ---
    const kappaData = [completedKappa, kappaTasks - completedKappa];

    if (!kappaChart) {
        kappaChart = new Chart(document.getElementById("kappaChart"), {
            type: "pie",
            data: {
                labels: ["完了", "未完了"],
                datasets: [{
                    data: kappaData,
                    backgroundColor: ["#4CAF50", "#ccc"]
                }]
            }
        });
    } else {
        kappaChart.data.datasets[0].data = kappaData;
        kappaChart.update();
    }

    // --- All Tasks Chart ---
    const allData = [completedTasks, totalTasks - completedTasks];

    if (!allTaskChart) {
        allTaskChart = new Chart(document.getElementById("allTaskChart"), {
            type: "pie",
            data: {
                labels: ["完了", "未完了"],
                datasets: [{
                    data: allData,
                    backgroundColor: ["#2196F3", "#ccc"]
                }]
            }
        });
    } else {
        allTaskChart.data.datasets[0].data = allData;
        allTaskChart.update();
    }
}



</script>

</body>
</html>
