fetch("/hideout.json")
  .then(res => res.json())
  .then(data => {
    renderFilters(data);
    renderDetails(data);

    // DOM が生成された後に取得
    window.selects = document.querySelectorAll('.facility-level');
    window.items = document.querySelectorAll('.item');

    // 保存されたレベルを復元
    const saved = JSON.parse(localStorage.getItem("hideoutLevels") || "{}");
    selects.forEach(sel => {
        const module = sel.dataset.module;
        if (saved[module] !== undefined) {
            sel.value = saved[module];
        }
    });

    // イベント登録
    selects.forEach(sel => {
        sel.addEventListener('change', updateItems);
    });

    // --- 円グラフの初期化 ---
    const ctx = document.getElementById('progressChart').getContext('2d');
    window.progressChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['完成済み', '未完成'],
            datasets: [{
                data: [0, 0],
                backgroundColor: ['#4CAF50', '#ccc']
            }]
        },
        options: {
            responsive: false,
            plugins: {
                tooltip: { enabled: true },
                legend: { display: true }
            }
        },
        plugins: [{
            id: 'centerText',
            afterDraw(chart) {
                const { ctx, chartArea: { width, height } } = chart;

                const completed = chart.data.datasets[0].data[0];
                const remaining = chart.data.datasets[0].data[1];
                const total = completed + remaining;

                if (total === 0) return;

                const percent = Math.round((completed / total) * 100);

                ctx.save();
                ctx.font = 'bold 28px sans-serif';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${percent}%`, width / 2, height / 2);
                ctx.restore();
            }
        }]
    });

    // --- h2 の折りたたみ設定 ---
    document.querySelectorAll("h2[data-module]").forEach(h2 => {
        h2.classList.add("collapsed");

        h2.addEventListener("click", () => {
            const isCollapsed = h2.classList.contains("collapsed");
            h2.classList.toggle("collapsed");
            h2.classList.toggle("expanded");

            let next = h2.nextElementSibling;
            while (next && next.tagName !== "H2") {
                if (next.tagName === "H3") {
                    if (isCollapsed) {
                        next.classList.remove("collapsed");
                    } else {
                        next.classList.add("collapsed");
                    }
                }
                next = next.nextElementSibling;
            }

            updateItems();
        });
    });

    // --- 初期状態で h3 を折りたたむ ---
    document.querySelectorAll("h3").forEach(h3 => {
        h3.classList.add("collapsed");
        h3.style.display = "none";
    });

    document.querySelectorAll("h3 + ul").forEach(ul => {
        ul.style.display = "none";
    });

    // --- 初回更新 ---
    updateItems();
  });

function renderFilters(data) {
    const container = document.getElementById("facility-filters");
    container.innerHTML = "";

    Object.entries(data).forEach(([module, levels]) => {
        const jpName = facility_name_map[module] || module;

        const label = document.createElement("label");
        label.innerHTML = `
            ${jpName}:
            <select class="facility-level" data-module="${module}">
                ${Array.from({length: Object.keys(levels).length + 1}, (_, i) =>
                    `<option value="${i}">${i}</option>`
                ).join("")}
            </select>
        `;
        container.appendChild(label);
        container.appendChild(document.createElement("br"));
    });
}


// 施設ごとの詳細描画
function renderDetails(data) {
    const container = document.getElementById("facility-details");
    container.innerHTML = "";

    Object.entries(data).forEach(([module, levels]) => {
        const jpName = facility_name_map[module] || module;

        const h2 = document.createElement("h2");
        h2.textContent = jpName;
        h2.dataset.module = module;
        container.appendChild(h2);

        Object.entries(levels).forEach(([level, info]) => {
            const h3 = document.createElement("h3");
            h3.textContent = `Level ${level}`;
            container.appendChild(h3);

            const ul = document.createElement("ul");

            Object.entries(info.items).forEach(([item, amount]) => {
                const li = document.createElement("li");

                li.classList.add("item");
                li.dataset.module = module;
                li.dataset.level = level;
                li.dataset.item = item;
                li.dataset.amount = amount;

                const jp = item_name_map[item]?.name || item;
                const img = item_name_map[item]?.img || "/noimage.png";
                
                li.innerHTML = `
                    <img src="${img}" class="item-icon">
                    <span>${jp} × ${amount}</span>
                `;

                ul.appendChild(li);
            });

            container.appendChild(ul);
        });
    });
}

// 合計素材
function updateTotals(data) {
    const total = {};
    Object.values(data).forEach(levels => {
        Object.values(levels).forEach(info => {
            Object.entries(info.items).forEach(([item, amount]) => {
                total[item] = (total[item] || 0) + amount;
            });
        });
    });

    const ul = document.getElementById("total-items");
    ul.innerHTML = "";

    Object.entries(total).forEach(([item, amount]) => {
        const jp = item_name_map[item]?.name || item;
        const li = document.createElement("li");
        li.textContent = `${jp} × ${amount}`;
        ul.appendChild(li);
    });
}

// 円グラフ（仮）
function updateChart(data) {
    // 必要なら後で実装
}


function updateItems() {
    // 現在レベルを取得
    const currentLevels = {};
    selects.forEach(sel => {
        const module = sel.dataset.module;
        const level = parseInt(sel.value);
        currentLevels[module] = level;
    });

    // アイテムの表示/非表示
    items.forEach(item => {
        const module = item.dataset.module;
        const level = parseInt(item.dataset.level);

        if (level <= currentLevels[module]) {
            item.style.display = "none";
        } else {
            item.style.display = "list-item";
        }
    });

    // h3（Level 見出し）の表示/非表示
document.querySelectorAll("h3").forEach(h3 => {
    const text = h3.textContent.trim();
    const level = parseInt(text.replace("Level ", ""));

    // h3 の直前にある h2 を探す
    let parentH2 = h3.previousElementSibling;
    while (parentH2 && parentH2.tagName !== "H2") {
        parentH2 = parentH2.previousElementSibling;
    }
    if(!parentH2) return; //安全対策

    const module = parentH2.dataset.module;

    // --- レベルによる非表示 ---
    const shouldHideByLevel = level <= currentLevels[module];

    // --- 折りたたみ状態による非表示 ---
    const isCollapsed = h3.classList.contains("collapsed");

    // --- 最終的な表示状態 ---
    if (shouldHideByLevel || isCollapsed) {
        h3.style.display = "none";
        if (h3.nextElementSibling && h3.nextElementSibling.tagName === "UL") {
            h3.nextElementSibling.style.display = "none";
        }
    } else {
        h3.style.display = "block";
        if (h3.nextElementSibling && h3.nextElementSibling.tagName === "UL") {
            h3.nextElementSibling.style.display = "block";
        }
    }
});


    // h2（施設名）を隠す処理
document.querySelectorAll("h2[data-module]").forEach(h2 => {
    const module = h2.dataset.module;

    let next = h2.nextElementSibling;
    let maxLevel = 0;

    while (next && next.tagName !== "H2") {
        if (next.tagName === "H3") {
            maxLevel++;
        }
        next = next.nextElementSibling;
    }

    if (currentLevels[module] >= maxLevel) {
        h2.style.display = "none";
    } else {
        h2.style.display = "block";
    }
});

// --- 必要アイテムの集計（日本語対応） ---
const itemTotals = {};

items.forEach(item => {
    const module = item.dataset.module;  // 英語の施設名
    const level = parseInt(item.dataset.level);

    if (level > currentLevels[module]) {
        const name = item.dataset.item;
        const amount = parseInt(item.dataset.amount);

        if (!itemTotals[name]) {
            itemTotals[name] = {
                total: 0,
                details: []
            };
        }

        itemTotals[name].total += amount;

        // ★ 日本語施設名に変換
        const jpModule = facility_name_map[module] || module;

        itemTotals[name].details.push(
            `${jpModule} の レベル ${level} で ${amount} 個`
        );
    }
});

// --- HTML に表示（日本語ツールチップ付き） ---
const totalList = document.getElementById("total-items");
totalList.innerHTML = "";

Object.entries(itemTotals).forEach(([name, data]) => {
    const li = document.createElement("li");
    li.className = "item-card";

    // 日本語名
    const jpName = item_name_map[name]?.name || name;

    // 画像（なければ noimage.png）
    const imgUrl = item_name_map[name]?.img || "/noimage.png";

    // カードUI
    li.innerHTML = `
        <img src="${imgUrl}" alt="${jpName}">
        <div class="item-card-name">${jpName}</div>
        <div class="item-card-count">${data.total} 個</div>
    `;

    // ホバー時の詳細（ツールチップ）
    li.title = data.details.join("\n");

    totalList.appendChild(li);
});



// --- 円グラフの更新（現在レベル / 全体レベル方式） ---
let currentScore = 0;
let totalScore = 0;

const facilityNames = Object.keys(currentLevels);

document.querySelectorAll("h2").forEach(h2 => {
    const module = h2.dataset.module;

    // 施設名以外は除外
    if (!facilityNames.includes(module)) return;

    // 最大レベルを数える
    let next = h2.nextElementSibling;
    let maxLevel = 0;
    while (next && next.tagName !== "H2") {
        if (next.tagName === "H3") maxLevel++;
        next = next.nextElementSibling;
    }

    if (maxLevel === 0) return;

    const current = currentLevels[module];

    // 全体スコアに最大レベルを加算
    totalScore += maxLevel;

    // 現在スコアに現在レベルを加算
    currentScore += current;
});

// 未完成スコア
let remainingScore = totalScore - currentScore;

// グラフ更新
progressChart.data.datasets[0].data = [
    currentScore,
    remainingScore
];

progressChart.update();

// --- 現在のレベルを保存 ---
localStorage.setItem("hideoutLevels", JSON.stringify(currentLevels));

}
